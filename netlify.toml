# Built For More ecosystem — Netlify config
[build]
  publish = "."

# pretty URLs + the personal start links (/start/CODE)
[[redirects]]
  from = "/start/*"
  to = "/start.html"
  status = 200

[[redirects]]
  from = "/start"
  to = "/start.html"
  status = 200

[[redirects]]
  from = "/hub"
  to = "/hub.html"
  status = 200

[[redirects]]
  from = "/trades"
  to = "/trades.html"
  status = 200

# bare domain lands on the Start welcome page (open onboarding) — the front door
[[redirects]]
  from = "/"
  to = "/start.html"
  status = 200
