<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITZ Hub — Walkthrough (John Doe · Mobile + Desktop)</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--void:#050805;--green:#39FF14;--card:rgba(255,255,255,.035);--border:rgba(255,255,255,.10);--dim:rgba(255,255,255,.52)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#000;color:#fff;font-family:'Barlow',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column}
  .stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:14px;background:radial-gradient(1200px 640px at 50% -15%,rgba(57,255,20,.06),transparent 70%),#000;overflow:hidden}
  .devices{display:flex;align-items:center;justify-content:center;gap:30px;width:100%}
  .devwrap{display:flex;flex-direction:column;align-items:center;gap:7px}
  .devtag{font-family:'Barlow Condensed';font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dim);font-size:11px}
  .phone{width:224px;height:466px;border-radius:28px;background:var(--void);border:1px solid rgba(255,255,255,.14);box-shadow:0 18px 55px rgba(0,0,0,.7),0 0 0 6px #0b0b0b;position:relative;overflow:hidden;flex-shrink:0}
  .phone .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:84px;height:16px;background:#0b0b0b;border-radius:0 0 10px 10px;z-index:5}
  .pscreen{position:absolute;inset:0;padding:22px 11px 11px;overflow:hidden;font-size:8px}
  .browser{width:min(650px,52vw);height:410px;border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,.14);box-shadow:0 20px 55px rgba(0,0,0,.6);background:var(--void);display:flex;flex-direction:column;flex-shrink:0}
  .bar{height:28px;background:#141414;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:6px;padding:0 10px;flex-shrink:0}
  .dot{width:8px;height:8px;border-radius:50%}.dot.r{background:#ff5f56}.dot.y{background:#ffbd2e}.dot.g{background:#27c93f}
  .url{flex:1;margin-left:8px;background:#0a0a0a;border:1px solid var(--border);border-radius:6px;color:var(--dim);font-size:10px;padding:3px 10px;font-family:monospace}.url b{color:#fff}
  .dview{flex:1;overflow:hidden;padding:15px 19px;position:relative;font-size:10.5px}
  .center{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .logo{border-radius:50%;background:radial-gradient(circle,#153a12,#0a0f0a);border:1px solid var(--green);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';color:var(--green)}
  .brand{display:flex;align-items:center;gap:7px;margin-bottom:9px}
  .h1{font-family:'Bebas Neue';letter-spacing:1px}.h1 span{color:var(--green)}
  .sub{color:var(--dim);letter-spacing:.5px;text-transform:uppercase}
  .fld{width:100%;background:#0a0a0a;border:1px solid var(--border);border-radius:7px;color:#fff;padding:7px 8px;margin-bottom:6px}
  .lab{font-family:'Barlow Condensed';font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--dim);margin:2px 0 5px}
  .btn{display:block;width:100%;background:var(--green);color:#000;font-family:'Barlow Condensed';font-weight:700;letter-spacing:1px;text-transform:uppercase;text-align:center;padding:8px;border-radius:7px;border:none}
  .btn.ghost{background:transparent;color:var(--green);border:1px solid var(--green)}
  .note{color:var(--dim);margin-top:6px;line-height:1.4}
  .pill{display:inline-block;background:rgba(57,255,20,.14);color:var(--green);border:1px solid var(--border);border-radius:20px;padding:2px 9px;font-weight:700}
  .card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:12px;width:100%}
  .stepbox{border-left:2px solid var(--green);padding:5px 0 5px 10px;color:var(--dim);line-height:1.5;margin-bottom:10px}
  .row{display:flex;align-items:center;justify-content:space-between;border:1px solid var(--border);border-radius:8px;padding:7px 10px;margin-bottom:6px}
  .row.done{border-color:var(--green)}
  .minibtn{background:var(--green);color:#000;font-family:'Barlow Condensed';font-weight:700;padding:4px 10px;border-radius:5px}
  .minibtn.ghost{background:transparent;color:var(--green);border:1px solid var(--green)}
  .seclabel{font-family:'Barlow Condensed';font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--green);margin:6px 0 8px;display:flex;align-items:center;gap:8px}
  .seclabel::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}
  .banner{border-radius:9px;padding:8px 11px;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between;gap:8px}
  .banner.team{background:linear-gradient(135deg,rgba(57,255,20,.16),rgba(57,255,20,.03));border:1px solid var(--green)}
  .banner.broker{background:rgba(255,255,255,.03);border:1px dashed var(--border)}
  .banner .bt{font-family:'Bebas Neue';letter-spacing:.3px}
  .banner .bd{color:var(--dim);line-height:1.3}
  .stats{display:grid;gap:6px;margin-bottom:9px}
  .stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px;text-align:center}
  .stat .n{font-family:'Bebas Neue';color:var(--green);line-height:1}
  .stat .l{letter-spacing:.5px;text-transform:uppercase;color:var(--dim);margin-top:3px}
  .tile{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px;position:relative}
  .tile .ic{border-radius:7px;background:rgba(57,255,20,.08);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin-bottom:5px}
  .tile h4{font-family:'Barlow Condensed';font-weight:700;letter-spacing:.3px}
  .tile p{color:var(--dim);line-height:1.3;margin-top:2px}
  .tile .badge{position:absolute;top:7px;right:8px;font-weight:800;background:rgba(255,255,255,.15);color:#fff;padding:2px 5px;border-radius:3px}
  .videoBox{border:1px solid var(--border);border-radius:9px;background:#0a0a0a;display:flex;align-items:center;justify-content:center;color:var(--green)}
  .titlehero{text-align:center}.titlehero .k{font-family:'Barlow Condensed';font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--green);margin-bottom:10px}.titlehero h1{font-family:'Bebas Neue';line-height:1;letter-spacing:1px}.titlehero p{color:var(--dim);margin-top:10px}
  .caption{width:min(1000px,94vw);display:flex;align-items:center;gap:16px;justify-content:center}
  .caption .step{font-family:'Barlow Condensed';font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--green);font-size:12px;white-space:nowrap}
  .caption h2{font-family:'Bebas Neue';font-size:22px;letter-spacing:1px;display:inline;margin-right:10px}
  .caption p{color:var(--dim);font-size:13px;display:inline}
  .caption .say{color:#dfffd6;font-size:12.5px;font-style:italic;border-left:3px solid var(--green);padding-left:11px;max-width:300px;line-height:1.4;text-align:left}
  .nav{display:flex;align-items:center;justify-content:space-between;padding:11px 22px;background:#0a0a0a;border-top:1px solid var(--border)}
  .nav .count{color:var(--dim);font-size:13px;letter-spacing:1px}
  .nav button{background:var(--green);color:#000;font-family:'Barlow Condensed';font-weight:700;letter-spacing:1px;text-transform:uppercase;font-size:13px;border:none;border-radius:8px;padding:9px 20px;cursor:pointer}
  .nav button.sec{background:transparent;color:#fff;border:1px solid var(--border)}
  .nav button:disabled{opacity:.35;cursor:default}
</style>
</head>

let i=0;
function render(){const s=S[i];document.getElementById('pscreen').innerHTML=s.phone;document.getElementById('dview').innerHTML=s.desk;document.getElementById('url').innerHTML='🔒 <b>'+s.url+'</b>';document.getElementById('caption').innerHTML=`<div class="step">${s.step}</div><div><h2>${s.h}</h2><p>${s.p}</p></div><div class="say">${s.say}</div>`;document.getElementById('count').textContent=`${i+1} / ${S.length}`;document.getElementById('prev').disabled=(i===0);document.getElementById('next').disabled=(i===S.length-1);}
document.getElementById('next').onclick=()=>{if(i<S.length-1){i++;render();}};
document.getElementById('prev').onclick=()=>{if(i>0){i--;render();}};
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' ')document.getElementById('next').click();if(e.key==='ArrowLeft')document.getElementById('prev').click();});
render();
</script>
